  <text x="116" y="342" fill="#FAF9F6" font-family="JetBrains Mono, monospace" font-size="28">&gt; edit workflow prompt</text>
  <text x="116" y="384" fill="#FAF9F6" font-family="JetBrains Mono, monospace" font-size="28">&gt; git commit</text>
  <text x="116" y="426" fill="#FAF9F6" font-family="JetBrains Mono, monospace" font-size="28">&gt; read reward, failure modes, and behavior summaries</text>
  <text x="116" y="468" fill="#8A8A96" font-family="JetBrains Mono, monospace" font-size="22">never reads raw task files, verifier code, or full transcripts</text>

