<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8A8A96"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8A84C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#111113" rx="8"/>

  <!-- LEFT SIDE: Open REPL -->
  <text x="220" y="36" fill="#8A8A96" font-size="11" text-anchor="middle" letter-spacing="2">OPEN REPL</text>
  <text x="220" y="54" fill="#55555F" font-size="10" text-anchor="middle">model decides decomposition</text>

  <!-- Model box -->
  <rect x="155" y="74" width="130" height="36" rx="4" fill="none" stroke="#2A2A2E" stroke-width="1.5"/>
  <text x="220" y="97" fill="#FAF9F6" font-size="11" text-anchor="middle">Model</text>

  <!-- Arrow down -->
  <line x1="220" y1="110" x2="220" y2="134" stroke="#8A8A96" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Generate Code -->
  <rect x="145" y="138" width="150" height="30" rx="4" fill="#1E1E21" stroke="#2A2A2E" stroke-width="1"/>
  <text x="220" y="158" fill="#8A8A96" font-size="10" text-anchor="middle">generate code</text>

  <!-- Arrow down -->
  <line x1="220" y1="168" x2="220" y2="188" stroke="#8A8A96" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Execute -->
  <rect x="145" y="192" width="150" height="30" rx="4" fill="#1E1E21" stroke="#2A2A2E" stroke-width="1"/>
  <text x="220" y="212" fill="#8A8A96" font-size="10" text-anchor="middle">execute in REPL</text>

  <!-- Arrow down -->
  <line x1="220" y1="222" x2="220" y2="242" stroke="#8A8A96" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Read output -->
  <rect x="145" y="246" width="150" height="30" rx="4" fill="#1E1E21" stroke="#2A2A2E" stroke-width="1"/>
  <text x="220" y="266" fill="#8A8A96" font-size="10" text-anchor="middle">read output</text>

  <!-- Loop arrow back to model -->
  <line x1="220" y1="276" x2="220" y2="296" stroke="#8A8A96" stroke-width="1"/>
  <path d="M220,296 Q220,316 100,316 Q80,316 80,296 L80,97" fill="none" stroke="#8A8A96" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="97" x2="152" y2="97" stroke="#8A8A96" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="56" y="212" fill="#55555F" font-size="9" text-anchor="middle" transform="rotate(-90, 56, 212)">48–150 turns</text>

  <!-- Question marks / variance -->
  <text x="220" y="340" fill="#55555F" font-size="10" text-anchor="middle">732K – 1.54M tokens</text>
  <text x="220" y="356" fill="#55555F" font-size="10" text-anchor="middle">2.1× variance</text>
  <text x="220" y="380" fill="#55555F" font-size="10" text-anchor="middle">cost unknown</text>
  <text x="220" y="396" fill="#55555F" font-size="10" text-anchor="middle">until done</text>

  <!-- Divider -->
  <line x1="450" y1="20" x2="450" y2="500" stroke="#2A2A2E" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- RIGHT SIDE: Lambda-RLM -->
  <text x="680" y="36" fill="#E8A84C" font-size="11" text-anchor="middle" letter-spacing="2">LAMBDA-RLM</text>
  <text x="680" y="54" fill="#8A8A96" font-size="10" text-anchor="middle">structure decides decomposition</text>

  <!-- Phase 1: Plan -->
  <rect x="545" y="74" width="270" height="56" rx="4" fill="none" stroke="#E8A84C" stroke-width="1.5"/>
  <text x="570" y="95" fill="#E8A84C" font-size="10" font-weight="bold">Plan</text>
  <text x="570" y="120" fill="#8A8A96" font-size="9">parse template → measure sources → compute k*, τ*</text>
  <text x="802" y="95" fill="#55555F" font-size="9" text-anchor="end">0 LLM calls</text>

  <!-- Arrow -->
  <line x1="680" y1="130" x2="680" y2="150" stroke="#E8A84C" stroke-width="1" marker-end="url(#arrow-accent)"/>

  <!-- Phase 2: Extract -->
  <rect x="545" y="154" width="270" height="56" rx="4" fill="none" stroke="#E8A84C" stroke-width="1.5"/>
  <text x="570" y="175" fill="#E8A84C" font-size="10" font-weight="bold">Extract</text>
  <text x="570" y="200" fill="#8A8A96" font-size="9">split → leaf extract → reduce (per section)</text>
  <text x="802" y="175" fill="#55555F" font-size="9" text-anchor="end">bounded leaves</text>

  <!-- Arrow -->
  <line x1="680" y1="210" x2="680" y2="230" stroke="#E8A84C" stroke-width="1" marker-end="url(#arrow-accent)"/>

  <!-- Phase 3: Review -->
  <rect x="545" y="234" width="270" height="56" rx="4" fill="none" stroke="#E8A84C" stroke-width="1.5"/>
  <text x="570" y="255" fill="#E8A84C" font-size="10" font-weight="bold">Review</text>
  <text x="570" y="280" fill="#8A8A96" font-size="9">contract alignment → re-extract if gaps</text>
  <text x="802" y="255" fill="#55555F" font-size="9" text-anchor="end">1 call/section</text>

  <!-- Arrow -->
  <line x1="680" y1="290" x2="680" y2="310" stroke="#E8A84C" stroke-width="1" marker-end="url(#arrow-accent)"/>

  <!-- Phase 4: Generate -->
  <rect x="545" y="314" width="270" height="56" rx="4" fill="none" stroke="#E8A84C" stroke-width="1.5"/>
  <text x="570" y="335" fill="#E8A84C" font-size="10" font-weight="bold">Generate</text>
  <text x="570" y="360" fill="#8A8A96" font-size="9">compose from extractions + dependencies</text>
  <text x="802" y="335" fill="#55555F" font-size="9" text-anchor="end">1 call/section</text>

  <!-- Results -->
  <text x="680" y="410" fill="#E8A84C" font-size="11" text-anchor="middle" font-weight="bold">53K tokens</text>
  <text x="680" y="428" fill="#8A8A96" font-size="10" text-anchor="middle">27 calls (= estimate)</text>
  <text x="680" y="452" fill="#8A8A96" font-size="10" text-anchor="middle">cost known</text>
  <text x="680" y="468" fill="#8A8A96" font-size="10" text-anchor="middle">before first call</text>

  <!-- Bottom attribution -->
  <text x="450" y="508" fill="#55555F" font-size="9" text-anchor="middle">the model fills the leaves · the structure is the plan</text>
</svg>
